<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>iDempiere PackOut Analyzer</title>
  <link rel="shortcut icon" type="image/jpg" href="https://media.licdn.com/dms/image/C4D0BAQHwgGRLDjlVHA/company-logo_200_200/0/1630573606602/gruppo_finmatica_logo?e=2147483647&v=beta&t=npdnko6NJmBqXAuTkQv7hkkNNHWbDMQVTppZkD4pQE0"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="./css/style.css" rel="stylesheet">
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="container-fluid">
    <div class="header-inner">
      <div class="app-brand">
        <img src="./source/logo-idempiere-packout-analyzer.png" alt="Logo" class="app-logo" />
        <h1 class="app-title">iDempiere PackOut Analyzer</h1>
      </div>
      <div class="upload-area" id="uploadArea">
        <input id="fileInput" type="file" accept=".zip" class="file-input" />
        <label for="fileInput" class="upload-label">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span id="uploadText">Carica file ZIP</span>
        </label>
        <button class="btn-analyze" onclick="parseFile()" id="btnAnalyze" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Analizza
        </button>
        <button class="btn-draw" onclick="showHierarchy()" id="btnDraw" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="8" y="14" width="8" height="7" rx="1"/><line x1="6.5" y1="10" x2="6.5" y2="14"/><line x1="17.5" y1="10" x2="17.5" y2="14"/></svg>
          Gerarchia
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Toolbar: search + filters (hidden until analysis) -->
<div class="toolbar" id="toolbar" style="display:none;">
  <div class="container-fluid">
    <div class="toolbar-inner">
      <!-- Search -->
      <div class="search-box">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Cerca per nome o UUID..." oninput="applyFilters()" />
        <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Multi-select type filter -->
      <div class="filter-group">
        <div class="multiselect" id="typeMultiselect">
          <button class="multiselect-toggle" type="button" onclick="toggleMultiselect()">
            <span id="multiselect-label">Tutti i tipi</span>
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="multiselect-dropdown" id="multiselect-dropdown"></div>
        </div>
      </div>

      <!-- Actions -->
      <div class="toolbar-actions">
        <span class="result-count" id="resultCount"></span>
        <button class="btn-toolbar" id="btnToggleAll" onclick="toggleAllCardsBtn()" title="Riduci tutte">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Cards container -->
<main class="container-fluid">
  <div id="emptyState" class="empty-state">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <p>Carica un file ZIP di PackOut per iniziare l'analisi</p>
  </div>
  <div id="cards" class="cards-grid"></div>
  <div id="noResults" class="empty-state" style="display:none;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    <p>Nessun risultato trovato</p>
  </div>
</main>

<!-- Hierarchy overlay -->
<div class="overlay" id="hierarchyOverlay" style="display:none;">
  <div class="overlay-toolbar">
    <span class="overlay-title">Gerarchia PackOut</span>
    <button class="btn-close-overlay" onclick="closeHierarchy()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="overlay-body" id="hierarchyBody"></div>
</div>

<!-- Detail overlay -->
<div class="overlay" id="detailOverlay" style="display:none;">
  <div class="overlay-toolbar">
    <span class="overlay-title" id="detailTitle">Dettaglio</span>
    <button class="btn-close-overlay" onclick="closeDetail()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="overlay-body" id="detailBody"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="./js/script.js"></script>
</body>
</html>
